<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Join us as we celebrate the wedding of Daniel & Edelys on July 31, 2026 in Sarasota & Tampa, FL." />
    <title>Daniel & Edelys - July 31, 2026</title>

    <!-- Google Fonts - preconnect + load early to avoid FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://danielandedelys.netlify.app/" />
    <meta property="og:title" content="Daniel & Edelys - Getting Married July 31, 2026" />
    <meta property="og:description" content="Join us as we celebrate our wedding day in Sarasota & Tampa, Florida. RSVP by June 30, 2026." />
    <meta property="og:image" content="https://danielandedelys.netlify.app/Tulipanes.jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / iMessage -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Daniel & Edelys - Getting Married July 31, 2026" />
    <meta name="twitter:description" content="Join us as we celebrate our wedding day in Sarasota & Tampa, Florida." />
    <meta name="twitter:image" content="https://danielandedelys.netlify.app/Tulipanes.jpeg" />

    <style>
      body { margin:0; padding:0; }
      #loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #FAF7F4;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.8s ease-out;
      }
      #loader.fade-out { opacity: 0; pointer-events: none; }
      .loader-names {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
        font-size: clamp(32px, 7vw, 56px);
        font-style: italic;
        color: #5C252C;
        letter-spacing: 1px;
        margin: 0;
        line-height: 1.1;
        text-align: center;
      }
      .loader-date {
        font-family: 'Lora', Georgia, serif;
        font-size: 11px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #3D6B2E;
        margin-top: 12px;
        font-weight: normal;
      }
      .loader-ring {
        width: 48px; height: 48px;
        border: 1px solid #D4A0A7;
        border-top-color: #722F37;
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
        margin-bottom: 32px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="loader-ring"></div>
      <p class="loader-names">Daniel &amp; Edelys</p>
      <p class="loader-date">July 31 · 2026</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
